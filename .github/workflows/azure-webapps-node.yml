name: Deploy Node app to Azure Web App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  # Set this repository variable in GitHub: Settings > Secrets and variables > Actions > Variables.
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  NODE_VERSION: '22.x'

concurrency:
  group: azure-webapp-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Configure npm registry (optional)
        if: ${{ vars.NPM_REGISTRY_URL != '' }}
        env:
          NPM_REGISTRY_URL: ${{ vars.NPM_REGISTRY_URL }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm config set registry "$NPM_REGISTRY_URL"

          if [ -n "$NPM_TOKEN" ]; then
            REG_HOST="$NPM_REGISTRY_URL"
            REG_HOST="${REG_HOST#https://}"
            REG_HOST="${REG_HOST#http://}"
            REG_HOST="${REG_HOST%/}"
            echo "//$REG_HOST/:_authToken=$NPM_TOKEN" >> ~/.npmrc
            npm config set always-auth true
          fi

      - name: Install dependencies
        run: |
          set -e
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build application
        run: npm run build

      - name: Package deploy artifact
        run: |
          mkdir deploy
          cp package.json deploy/
          if [ -f package-lock.json ]; then cp package-lock.json deploy/; fi
          cp server.ts deploy/
          cp -R dist deploy/

      - name: Upload artifact for deployment
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Validate Azure credentials
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then
            echo "Missing Azure credentials. Configure secret:"
            echo "AZURE_WEBAPP_PUBLISH_PROFILE (publish profile XML)"
            exit 1
          fi

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
